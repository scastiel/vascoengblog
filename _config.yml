title: Vasco Engineering
tagline: Notes from the team building the revenue context layer.
description: >-
  Technical writing on the systems, tradeoffs, and hard-won lessons behind
  Vasco — the structured data layer that keeps AI revenue agents honest.
url: "https://engineering.vasco.app"
baseurl: ""

# Clean per-post URLs under /articles/, e.g. /articles/four-agent-frameworks/
permalink: /articles/:title/

markdown: kramdown
kramdown:
  input: GFM

# Site defaults: every file in _posts/ gets the post layout. Each post declares
# its own author/author_role/author_initials in front matter, and may set
# author_url (e.g. a LinkedIn profile) to render the name as a link.
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post

# Not part of the built site.
exclude:
  - _handoff
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor
  - scratchpad
